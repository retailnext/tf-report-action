name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: CI
        run: npm run ci

      - name: Check dist up to date
        run: npm run check:dist

      - name: Report CI Status
        if: always()
        uses: ./
        with:
          steps: ${{ toJSON(steps) }}
          workspace: ci
          github-token: ${{ github.token }}
