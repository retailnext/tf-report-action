version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    ignore:
      # @types/node major version must match Node.js version in action.yml.
      # Upgrading requires coordinating action.yml, .node-version,
      # engines.node, and the enforcement test. Only allow minor/patch.
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
